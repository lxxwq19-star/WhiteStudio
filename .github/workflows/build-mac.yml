name: Build WhiteStudio for macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6
          pip install -r requirements.txt
          pip install pyinstaller
          echo "=== Key packages ==="
          pip list | grep -iE "torch|PySide|pyinstaller|transformers|timm"

      - name: Download BiRefNet model weights
        run: |
          echo "=== Downloading BiRefNet model ==="
          mkdir -p models_cache/general_local
          python download_model.py
          echo "=== Model files ==="
          ls -lh models_cache/general_local/ || echo "Model download failed"

      - name: Run PyInstaller
        run: |
          echo "=== Running PyInstaller ==="
          python -m PyInstaller \
            --name WhiteStudio \
            --windowed \
            --noconfirm \
            --clean \
            --log-level INFO \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageDraw \
            --hidden-import PIL.ImageFont \
            --hidden-import numpy \
            --hidden-import cv2 \
            --hidden-import torch \
            --hidden-import transformers \
            --hidden-import timm \
            --hidden-import einops \
            --hidden-import safetensors \
            --hidden-import huggingface_hub \
            --add-data "app:app" \
            --add-data "models_cache/general_local:birefnet_local" \
            run.py
          echo "=== dist/ contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"

      - name: Create .dmg
        run: |
          echo "=== Creating DMG ==="
          ls -la dist/ 2>/dev/null || { echo "dist/ not found!"; exit 1; }
          APP_SRC="dist/WhiteStudio.app"
          if [ ! -d "$APP_SRC" ]; then
            echo "ERROR: WhiteStudio.app not found"
            exit 1
          fi
          mkdir -p dist/dmg_tmp
          cp -R "$APP_SRC" dist/dmg_tmp/
          ln -s /Applications dist/dmg_tmp/Applications
          hdiutil create -volname "WhiteStudio" -srcfolder dist/dmg_tmp -ov -format UDZO dist/WhiteStudio.dmg
          echo "=== DMG created ==="
          ls -lh dist/WhiteStudio.dmg

      - name: Upload .dmg
        uses: actions/upload-artifact@v4
        with:
          name: WhiteStudio-macOS
          path: dist/WhiteStudio.dmg
          retention-days: 30
