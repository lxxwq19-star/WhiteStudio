name: Build WhiteStudio for macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6
        pip install -r requirements.txt
        pip install pyinstaller
        echo "=== Installed packages ==="
        pip list | grep -iE "torch|pySide|pyinstaller|transformers"
    
    - name: Build with PyInstaller
      run: |
        echo "=== Starting PyInstaller build ==="
        pyinstaller build_exe/WhiteStudio-macos.spec --noconfirm --clean --log-level=INFO 2>&1 | tee pyinstaller.log
        echo "=== EXIT CODE: $? ==="
        echo ""
        echo "=== Everything in dist/ (recursive, depth 3) ==="
        find dist -maxdepth 3 2>/dev/null || echo "dist/ not found"
        echo ""
        echo "=== Top level of dist/ ==="
        ls -laR dist/ 2>/dev/null || echo "dist/ empty or missing"
    
    - name: Create .dmg
      run: |
        echo "=== Scanning for build output ==="
        # 列出所有可能的产物
        ls -la dist/
        
        # 查找 .app 或目录
        APP_PATH=""
        if [ -d "dist/WhiteStudio.app" ]; then
          APP_PATH="dist/WhiteStudio.app"
          echo "Found: WhiteStudio.app"
        elif [ -d "dist/WhiteStudio" ]; then
          APP_PATH="dist/WhiteStudio"
          echo "Found: WhiteStudio directory"
        else
          # 列出 dist 下所有内容，找任何 .app 或目录
          echo "Looking for any .app bundle..."
          find dist -name "*.app" -type d 2>/dev/null
          echo "All items in dist:"
          find dist -maxdepth 2 2>/dev/null
        fi
        
        if [ -z "$APP_PATH" ]; then
          echo "ERROR: Cannot find build output!"
          exit 1
        fi
        
        mkdir -p dist/dmg_tmp
        cp -R "$APP_PATH" dist/dmg_tmp/WhiteStudio.app
        ln -s /Applications dist/dmg_tmp/Applications
        
        hdiutil create -volname "WhiteStudio" -srcfolder dist/dmg_tmp -ov -format UDZO dist/WhiteStudio.dmg
        echo ""
        echo "=== DMG created successfully ==="
        ls -lh dist/WhiteStudio.dmg
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: pyinstaller.log
        retention-days: 7
    
    - name: Upload .dmg as artifact
      uses: actions/upload-artifact@v4
      with:
        name: WhiteStudio-macOS
        path: dist/WhiteStudio.dmg
        retention-days: 30
