name: Build WhiteStudio for macOS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6
        pip install -r requirements.txt
        pip install pyinstaller
        echo "=== Installed packages ==="
        pip list
    
    - name: Verify app structure
      run: |
        echo "=== Project structure ==="
        ls -la
        echo "=== app directory ==="
        ls -la app/
        echo "=== run.py exists ==="
        cat run.py | head -20
    
    - name: Build with PyInstaller (verbose)
      run: |
        echo "=== Starting PyInstaller ==="
        pyinstaller build_exe/WhiteStudio-macos.spec --noconfirm --clean --log-level=DEBUG 2>&1 | tee pyinstaller.log || true
        echo "=== PyInstaller log ==="
        cat pyinstaller.log || echo "No log file"
        echo "=== dist directory ==="
        ls -la dist/ || echo "dist directory not found"
      continue-on-error: true
    
    - name: Create .dmg (if build succeeded)
      if: success()
      run: |
        mkdir -p dist/dmg_tmp
        cp -R dist/WhiteStudio.app dist/dmg_tmp/ || cp -R dist/WhiteStudio dist/dmg_tmp/
        ln -s /Applications dist/dmg_tmp/Applications
        hdiutil create -volname "WhiteStudio" -srcfolder dist/dmg_tmp -ov -format UDZO dist/WhiteStudio.dmg
        ls -lh dist/WhiteStudio.dmg
    
    - name: Upload build logs
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: pyinstaller.log
        retention-days: 7
    
    - name: Upload .dmg as artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: WhiteStudio-macOS
        path: dist/WhiteStudio.dmg
        retention-days: 30
